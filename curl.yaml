apiVersion: v1
kind: Pod
metadata:
  name: curl
  namespace: default
  annotations:
    kubernetes.azure.com/static-gateway-configuration: gateway-config
spec:
  containers:
  - name: curl
    image: curlimages/curl:latest
    command: ["sleep","infinity"]
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 64Mi